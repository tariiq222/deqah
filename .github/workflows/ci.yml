name: CI

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [develop, staging, main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: deqah_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/deqah_test
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/deqah_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: localhost
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: deqah-test
      MINIO_USE_SSL: "false"
      JWT_ACCESS_SECRET: ci-test-access-secret-32chars!!
      JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars!!
      JWT_CLIENT_ACCESS_SECRET: ci-test-client-secret-32chars!!
      JWT_OTP_SECRET: ci-test-otp-secret-32chars!!!!!!
      # All encryption keys are 32-byte base64 (43 chars + '=' padding).
      # Test-only values, generated with `node -e "crypto.randomBytes(32).toString('base64')"`.
      SMS_PROVIDER_ENCRYPTION_KEY: TLz/2f9V4Rs27iI+lKeoyCR7USrVq4P3ahiBNXKdvjI=
      ZOOM_PROVIDER_ENCRYPTION_KEY: WzXHN34y+z/L+50u7XjYM0pV+XWbaIJDk4QitDqOV/A=
      EMAIL_PROVIDER_ENCRYPTION_KEY: VrYh2xckvjMbc6mp7JBfJY385J5Rrmu1T9tB8hm2zTQ=
      MOYASAR_TENANT_ENCRYPTION_KEY: FWH3+/2jyaECCswGyaTtLTgooSd3eQcJ0fJEi9+T9zk=
      ZOHO_PROVIDER_ENCRYPTION_KEY: muUaXaGMQzWh1C+1DhuDdo2XIz6PCck+ql859E7S57o=
      TENANT_ENFORCEMENT: strict
      DEFAULT_ORGANIZATION_ID: "00000000-0000-0000-0000-000000000001"
      BILLING_CRON_ENABLED: "false"
      SUPER_ADMIN_PASSWORD: TestAdmin@2026CiPassword!!
      MOYASAR_PLATFORM_SECRET_KEY: sk_test_ci_placeholder_change_me_now
      MOYASAR_PLATFORM_WEBHOOK_SECRET: ci_webhook_secret_placeholder_here
      PLATFORM_VAT_NUMBER: "300000000000003"
      PLATFORM_COMPANY_NAME_AR: "اختبار CI"
      PLATFORM_COMPANY_NAME_EN: "CI Test Company"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Build shared packages (dist required by tests)
        run: pnpm --filter "@deqah/shared" run build

      - name: Enable pgvector extension
        run: psql postgresql://test:test@localhost:5432/deqah_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Create shadow database for prisma migrate diff
        run: |
          psql postgresql://test:test@localhost:5432/postgres -c "CREATE DATABASE deqah_test_shadow;"
          psql postgresql://test:test@localhost:5432/deqah_test_shadow -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run migrations
        working-directory: apps/backend
        run: npx prisma migrate deploy

      # TODO: drift exists between migrations/ and schema/ (BillingCredit.reason
      # nullability, Booking index renames, Branch FK removal, orphan table).
      # Re-enable as a hard gate once a fresh migration is generated.
      - name: Check schema drift
        continue-on-error: true
        working-directory: apps/backend
        env:
          SHADOW_DATABASE_URL: postgresql://test:test@localhost:5432/deqah_test_shadow
        run: npx prisma migrate diff --from-migrations prisma/migrations --to-schema prisma/schema --exit-code

      - name: Unit tests
        working-directory: apps/backend
        run: pnpm run test

      - name: Security audit
        continue-on-error: true
        run: pnpm audit --prod --audit-level=high

      - name: Check coverage thresholds
        working-directory: apps/backend
        run: npx jest --coverage --coverageThreshold='{"global":{"branches":60,"functions":70,"lines":75}}'

      # E2E + security suites need a fully provisioned dev stack
      # (Postgres on :5999, Redis on :5380, MinIO on :9000) and seed
      # data. They run nightly on the staging server, not in PR CI.
      # See `.github/workflows/nightly-e2e.yml` (TBD).

  typecheck:
    name: TypeScript checks (all packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: apps/backend
        run: npx prisma generate

      # Build shared packages first so typecheck can find compiled output
      - name: Build shared packages
        run: pnpm --filter "@deqah/shared" run build

      # Typecheck all workspaces except mobile (mobile is paused — see CLAUDE.md)
      - name: Typecheck root packages
        run: npx turbo run typecheck --filter='!deqah-mobile'

      - name: Typecheck dashboard
        run: pnpm --filter dashboard run typecheck

      - name: Typecheck admin
        run: pnpm --filter admin run typecheck

      - name: Typecheck marketing
        run: pnpm --filter @deqah/marketing run typecheck

      # Mobile typecheck is intentionally paused — apps/mobile is under
      # development and excluded from CI. Re-enable when ready.
      # - name: Typecheck mobile
      #   run: pnpm --filter deqah-mobile run typecheck

  lint:
    name: Lint (all apps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Lint backend
        run: pnpm --filter backend run lint

      - name: Lint dashboard
        run: pnpm --filter dashboard run lint

      - name: Lint admin
        run: pnpm --filter admin run lint

      - name: Lint marketing
        run: pnpm --filter @deqah/marketing run lint

      - name: Lint mobile
        run: pnpm --filter deqah-mobile run lint

  dashboard-build:
    name: Dashboard build + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages (required by dashboard)
        run: pnpm --filter "@deqah/shared" run build && pnpm --filter "@deqah/api-client" run build && pnpm --filter "@deqah/ui" run build

      - name: Build dashboard
        working-directory: apps/dashboard
        env:
          NEXT_PUBLIC_HCAPTCHA_SITE_KEY: "10000000-ffff-ffff-ffff-000000000001"
        run: pnpm run build

      - name: Build admin
        working-directory: apps/admin
        env:
          NEXT_PUBLIC_HCAPTCHA_SITE_KEY: "10000000-ffff-ffff-ffff-000000000001"
        run: pnpm run build

      - name: Build marketing
        working-directory: apps/marketing
        run: pnpm run build

  mobile:
    name: Mobile (deqah-mobile typecheck + tests)
    # apps/mobile is paused — under active development, excluded from CI gates.
    # Re-enable by removing `if: false` once the mobile build is stable.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages (required by mobile)
        run: pnpm --filter "@deqah/shared" run build

      - name: Mobile typecheck
        run: pnpm --filter deqah-mobile run typecheck

      - name: Mobile tests
        run: pnpm --filter deqah-mobile run test

