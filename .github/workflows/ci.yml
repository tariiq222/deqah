          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Build shared packages (dist required by tests)
        run: pnpm --filter "@deqah/shared" run build

      - name: Enable pgvector extension
        run: psql postgresql://test:test@localhost:5432/deqah_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run migrations
        working-directory: apps/backend
        run: npx prisma migrate deploy

      - name: Run isolation tests (permissive)
        working-directory: apps/backend
        run: NODE_OPTIONS="--max-old-space-size=4096" npx jest --config test/jest-e2e.json --testPathPattern="isolation|penetration" --runInBand --forceExit

