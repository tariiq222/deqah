        run: npx prisma migrate deploy

      - name: Build backend
        working-directory: apps/backend
        run: pnpm run build

      - name: Regenerate openapi.json
        working-directory: apps/backend
        run: pnpm run openapi:snapshot

      - name: Warn if snapshot drifted (non-blocking)
        continue-on-error: true
        run: git diff --exit-code apps/backend/openapi.json

      - name: Coverage check (non-blocking — 322 known doc gaps)
        continue-on-error: true
        working-directory: apps/backend
        run: pnpm run check:openapi-coverage
