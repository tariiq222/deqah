          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages (required by dashboard)
        run: pnpm --filter "@deqah/shared" run build && pnpm --filter "@deqah/api-client" run build && pnpm --filter "@deqah/ui" run build

      - name: Run dashboard tests
        run: pnpm --filter dashboard run test

  admin-test:
    name: Admin unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages (required by admin)
        run: pnpm --filter "@deqah/shared" run build && pnpm --filter "@deqah/api-client" run build && pnpm --filter "@deqah/ui" run build

      - name: Run admin tests
        run: pnpm --filter admin run test
