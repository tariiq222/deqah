name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: deqah_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Enable pgvector extension
        run: psql postgresql://test:test@localhost:5432/deqah_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run migrations
        working-directory: apps/backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/deqah_test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          MINIO_ENDPOINT: localhost
          MINIO_PORT: "9000"
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: deqah-test
          MINIO_USE_SSL: "false"
          JWT_ACCESS_SECRET: ci-test-access-secret-32chars!!
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars!!
          JWT_CLIENT_ACCESS_SECRET: ci-test-client-secret-32chars!!
          SMS_PROVIDER_ENCRYPTION_KEY: Y2ktdGVzdC1zbXMta2V5LTMyLWJ5dGVzLWZpbGw=
          TENANT_ENFORCEMENT: permissive
          DEFAULT_ORGANIZATION_ID: "00000000-0000-0000-0000-000000000001"
          BILLING_CRON_ENABLED: "false"

      - name: Unit tests
        working-directory: apps/backend
        run: pnpm run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/deqah_test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          MINIO_ENDPOINT: localhost
          MINIO_PORT: "9000"
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: deqah-test
          MINIO_USE_SSL: "false"
          JWT_ACCESS_SECRET: ci-test-access-secret-32chars!!
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars!!
          JWT_CLIENT_ACCESS_SECRET: ci-test-client-secret-32chars!!
          SMS_PROVIDER_ENCRYPTION_KEY: Y2ktdGVzdC1zbXMta2V5LTMyLWJ5dGVzLWZpbGw=
          TENANT_ENFORCEMENT: permissive
          DEFAULT_ORGANIZATION_ID: "00000000-0000-0000-0000-000000000001"
          BILLING_CRON_ENABLED: "false"

      - name: E2E tests
        working-directory: apps/backend
        run: pnpm run test:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/deqah_test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          MINIO_ENDPOINT: localhost
          MINIO_PORT: "9000"
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: deqah-test
          MINIO_USE_SSL: "false"
          JWT_ACCESS_SECRET: ci-test-access-secret-32chars!!
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars!!
          JWT_CLIENT_ACCESS_SECRET: ci-test-client-secret-32chars!!
          SMS_PROVIDER_ENCRYPTION_KEY: Y2ktdGVzdC1zbXMta2V5LTMyLWJ5dGVzLWZpbGw=
          TENANT_ENFORCEMENT: permissive
          DEFAULT_ORGANIZATION_ID: "00000000-0000-0000-0000-000000000001"
          BILLING_CRON_ENABLED: "false"

      - name: Cross-tenant penetration suite
        working-directory: apps/backend
        run: pnpm run test:security
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/deqah_test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          MINIO_ENDPOINT: localhost
          MINIO_PORT: "9000"
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: deqah-test
          MINIO_USE_SSL: "false"
          JWT_ACCESS_SECRET: ci-test-access-secret-32chars!!
          JWT_REFRESH_SECRET: ci-test-refresh-secret-32chars!!
          JWT_CLIENT_ACCESS_SECRET: ci-test-client-secret-32chars!!
          SMS_PROVIDER_ENCRYPTION_KEY: Y2ktdGVzdC1zbXMta2V5LTMyLWJ5dGVzLWZpbGw=
          TENANT_ENFORCEMENT: permissive
          DEFAULT_ORGANIZATION_ID: "00000000-0000-0000-0000-000000000001"
          BILLING_CRON_ENABLED: "false"

  env-drift:
    name: Env-var drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check env drift (Joi schema vs .env.prod.example)
        run: node scripts/ci/check-env-drift.mjs

  api-docs:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: deqah_docs
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Enable pgvector extension
        run: psql postgresql://test:test@localhost:5432/deqah_docs -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run migrations
        working-directory: apps/backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/deqah_docs

      - name: Build backend
        working-directory: apps/backend
        run: pnpm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/deqah_docs
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          MINIO_ENDPOINT: localhost
          MINIO_PORT: "9000"
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: deqah-test
          MINIO_USE_SSL: "false"
          JWT_ACCESS_SECRET: ci-docs-access-secret-32chars!!
          JWT_REFRESH_SECRET: ci-docs-refresh-secret-32chars!!
          JWT_CLIENT_ACCESS_SECRET: ci-docs-client-secret-32chars!!
          SMS_PROVIDER_ENCRYPTION_KEY: Y2ktdGVzdC1zbXMta2V5LTMyLWJ5dGVzLWZpbGw=
          TENANT_ENFORCEMENT: permissive
          DEFAULT_ORGANIZATION_ID: "00000000-0000-0000-0000-000000000001"
          BILLING_CRON_ENABLED: "false"
          MOYASAR_PLATFORM_SECRET_KEY: sk_test_ci_placeholder_change_me_now
          MOYASAR_PLATFORM_WEBHOOK_SECRET: ci_webhook_secret_placeholder_here

      - name: Regenerate openapi.json
        working-directory: apps/backend
        run: pnpm run openapi:snapshot
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/deqah_docs
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          MINIO_ENDPOINT: localhost
          MINIO_PORT: "9000"
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: deqah-test
          MINIO_USE_SSL: "false"
          JWT_ACCESS_SECRET: ci-docs-access-secret-32chars!!
          JWT_REFRESH_SECRET: ci-docs-refresh-secret-32chars!!
          JWT_CLIENT_ACCESS_SECRET: ci-docs-client-secret-32chars!!
          SMS_PROVIDER_ENCRYPTION_KEY: Y2ktdGVzdC1zbXMta2V5LTMyLWJ5dGVzLWZpbGw=
          TENANT_ENFORCEMENT: permissive
          DEFAULT_ORGANIZATION_ID: "00000000-0000-0000-0000-000000000001"
          BILLING_CRON_ENABLED: "false"
          MOYASAR_PLATFORM_SECRET_KEY: sk_test_ci_placeholder_change_me_now
          MOYASAR_PLATFORM_WEBHOOK_SECRET: ci_webhook_secret_placeholder_here

      - name: Fail if snapshot drifted
        run: git diff --exit-code apps/backend/openapi.json

      - name: Coverage check
        working-directory: apps/backend
        run: pnpm run check:openapi-coverage
