# Build & Push Docker images to GHCR + trigger Dokploy deploy
#
# Branch → Tag → Dokploy environment:
#   staging → :develop  → Dokploy "deqah / staging"   (auto)
#   main    → :latest   → Dokploy "deqah / production" (auto)
#
# Per-app build matrix detects which apps actually changed using `git diff`
# against the previous commit on the same branch. Shared package changes
# rebuild all consuming apps.
#
# Required secrets:
#   GITHUB_TOKEN          (auto)         — push to ghcr.io
#   DOKPLOY_API_URL       (repo secret)  — https://dokploy.webvue.pro
#   DOKPLOY_API_TOKEN     (repo secret)  — Dokploy API token
#
# Manual rebuild:
#   gh workflow run build-images.yml -f apps=all
#   gh workflow run build-images.yml -f apps=backend,dashboard

name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:
    inputs:
      apps:
        description: 'Comma-separated apps to build, or "all"'
        default: 'all'
        required: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Decide which apps to build
  # ─────────────────────────────────────────────────────────────────────────
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.matrix.outputs.apps }}
      tag: ${{ steps.tag.outputs.tag }}
      env_name: ${{ steps.tag.outputs.env_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve tag and environment
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "env_name=production" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            echo "tag=develop" >> "$GITHUB_OUTPUT"
            echo "env_name=staging" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unsupported branch: ${{ github.ref }}"
            exit 1
          fi

      - name: Compute affected apps
        id: matrix
        run: |
          set -euo pipefail
          ALL_APPS='["backend","dashboard","admin","marketing"]'

          # Manual override
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ inputs.apps }}"
            if [ -z "$INPUT" ] || [ "$INPUT" = "all" ]; then
              echo "apps=$ALL_APPS" >> "$GITHUB_OUTPUT"
            else
              JSON=$(echo "$INPUT" | tr ',' '\n' | jq -R . | jq -s -c .)
              echo "apps=$JSON" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # First commit (no parent) → build everything
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "apps=$ALL_APPS" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # If shared package or lockfile changed → rebuild all consumers
          # backend depends on packages/shared
          # dashboard/admin depend on packages/shared, packages/api-client, packages/ui
          # marketing depends on packages/shared, packages/ui
          REBUILD_ALL=false
          if echo "$CHANGED_FILES" | grep -qE '^pnpm-lock\.yaml$|^pnpm-workspace\.yaml$|^turbo\.json$|^\.github/workflows/build-images\.yml$'; then
            REBUILD_ALL=true
          fi

          # Per-package impact
          if echo "$CHANGED_FILES" | grep -qE '^packages/shared/'; then
            REBUILD_ALL=true
          fi

          if [ "$REBUILD_ALL" = true ]; then
            echo "Shared change → rebuilding all apps"
            echo "apps=$ALL_APPS" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          AFFECTED='[]'
          add_app() { AFFECTED=$(echo "$AFFECTED" | jq -c ". + [\"$1\"] | unique"); }

          if echo "$CHANGED_FILES" | grep -qE '^apps/backend/'; then add_app backend; fi
          if echo "$CHANGED_FILES" | grep -qE '^apps/dashboard/'; then add_app dashboard; fi
          if echo "$CHANGED_FILES" | grep -qE '^apps/admin/'; then add_app admin; fi
          if echo "$CHANGED_FILES" | grep -qE '^apps/marketing/'; then add_app marketing; fi

          # api-client / ui only affect frontends
          if echo "$CHANGED_FILES" | grep -qE '^packages/(api-client|ui)/'; then
            add_app dashboard; add_app admin
            if echo "$CHANGED_FILES" | grep -qE '^packages/ui/'; then
              add_app marketing
            fi
          fi

          if [ "$AFFECTED" = "[]" ]; then
            echo "No app changes detected — skipping build"
            echo "apps=[]" >> "$GITHUB_OUTPUT"
          else
            echo "apps=$AFFECTED" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Build & push each affected app
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.app }}
    needs: detect
    if: needs.detect.outputs.apps != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ needs.detect.outputs.env_name }}
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect.outputs.apps) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Dockerfile path
        id: dockerfile
        run: |
          # marketing app is the public marketing site under apps/marketing
          # all others map directly: apps/<name>/Dockerfile
          echo "path=apps/${{ matrix.app }}/Dockerfile" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/deqah-${{ matrix.app }}:${{ needs.detect.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/deqah-${{ matrix.app }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_HCAPTCHA_SITE_KEY=${{ vars.NEXT_PUBLIC_HCAPTCHA_SITE_KEY }}
            NEXT_PUBLIC_MOYASAR_PLATFORM_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_MOYASAR_PLATFORM_PUBLISHABLE_KEY }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/deqah-${{ matrix.app }}:buildcache-${{ needs.detect.outputs.env_name }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/deqah-${{ matrix.app }}:buildcache-${{ needs.detect.outputs.env_name }},mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Run prisma migrate deploy — local verify then SSH to server
  #    Runs only when the backend image was rebuilt.
  # ─────────────────────────────────────────────────────────────────────────
  migrate:
    name: Migrate DB → ${{ needs.detect.outputs.env_name }}
    needs: [detect, build]
    if: needs.build.result == 'success' && contains(fromJSON(needs.detect.outputs.apps), 'backend')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ needs.detect.outputs.env_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install backend deps (for prisma CLI)
        run: pnpm --filter @deqah/backend install --frozen-lockfile

      - name: Verify migrations locally (dry-run schema check)
        working-directory: apps/backend
        run: npx prisma migrate diff --from-schema-datasource prisma/schema --to-schema-datamodel prisma/schema --script 2>&1 | head -40 || true

      - name: Run prisma migrate deploy on server via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ENV_NAME: ${{ needs.detect.outputs.env_name }}
        run: |
          set -euo pipefail
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Determine container name by environment
          if [ "$ENV_NAME" = "production" ]; then
            CONTAINER="deqah-backend"
          else
            CONTAINER="deqah-backend-staging"
          fi

          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key "$SSH_USER@$SSH_HOST" \
            "docker exec $CONTAINER npx prisma migrate deploy --schema=prisma/schema && echo '✅ Migrations applied'"

          rm -f /tmp/deploy_key

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Trigger Dokploy deploy for each freshly built app
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy ${{ matrix.app }} → ${{ needs.detect.outputs.env_name }}
    needs: [detect, build, migrate]
    if: needs.detect.outputs.apps != '[]' && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        app: ${{ fromJSON(needs.detect.outputs.apps) }}

    steps:
      - name: Resolve Dokploy application ID
        id: appid
        env:
          ENV_NAME: ${{ needs.detect.outputs.env_name }}
          APP: ${{ matrix.app }}
        run: |
          set -euo pipefail
          # Production app IDs
          declare -A PROD=(
            [backend]=cL9a6MswF-OmV1uhoZtIY
            [dashboard]=wu-vMb74JemIU3ZfyYkWw
            [admin]=9AjwlCKwfefGuTjU6Aazc
            [marketing]=xqkKTaQ8vAdU1dqqs6A6v
          )
          declare -A STAG=(
            [backend]=2MiejKDecN5qEMdNWBPX1
            [dashboard]=XIZupg4zULX6Y8U7WOLaa
            [admin]=rv1tgeQLqrCskvcxvTQDN
            [marketing]=Efo6d99tYxNXiZi1HadWD
          )
          if [ "$ENV_NAME" = "production" ]; then
            ID=${PROD[$APP]}
          else
            ID=${STAG[$APP]}
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Trigger Dokploy deploy
        env:
          DOKPLOY_API_URL: ${{ secrets.DOKPLOY_API_URL }}
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          APP_ID: ${{ steps.appid.outputs.id }}
        run: |
          set -euo pipefail
          curl -fsS -X POST "$DOKPLOY_API_URL/api/application.deploy" \
            -H "x-api-key: $DOKPLOY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"$APP_ID\"}" | head -c 500
          echo ""
          echo "✅ Deploy triggered for ${{ matrix.app }} → ${{ needs.detect.outputs.env_name }}"

  # ─────────────────────────────────────────────────────────────────────────
  # 5. Summary
  # ─────────────────────────────────────────────────────────────────────────
  summary:
    name: Summary
    needs: [detect, build, migrate, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        env:
          APPS: ${{ needs.detect.outputs.apps }}
          TAG: ${{ needs.detect.outputs.tag }}
          ENV_NAME: ${{ needs.detect.outputs.env_name }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          {
            echo "### Build & Deploy"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Tag | \`$TAG\` |"
            echo "| Environment | \`$ENV_NAME\` |"
            echo "| Apps | \`$APPS\` |"
            echo "| Build | $BUILD_RESULT |"
            echo "| Deploy | $DEPLOY_RESULT |"
          } >> "$GITHUB_STEP_SUMMARY"
