# Build & Push to GitHub Container Registry (ghcr.io)
#
# Triggers:
#   - push to main (after the sanitizer publishes from develop→main)
#   - push of a semver tag (v*) — triggered by scripts/release.sh
#   - manual workflow_dispatch
#
# Outputs (per app):
#   ghcr.io/tariiq222/deqah-{backend,dashboard,admin,website}:v<semver>          ← primary, from apps/<app>/package.json
#                                                              :v<semver>-<sha>  ← versioned + sha (main only)
#                                                              :latest           ← supplementary (main only)
#                                                              :<sha>            ← supplementary
#                                                              :<date>-<run>     ← supplementary
#
# IMPORTANT — Manual step after the FIRST successful run:
# 1. Go to https://github.com/users/tariiq222/packages
# 2. Click each of the 4 packages (deqah-backend, deqah-dashboard, deqah-admin, deqah-website)
# 3. Settings → Change visibility → Public
# This makes Dokploy able to pull without authentication. Only needed once per package.
#
# The sanitizer (scripts/sync-main-branch.sh) keeps ONLY this file from .github/
# when sanitizing develop → main. All other workflows are stripped from main.

name: Build & Push Images to GHCR

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.app.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: backend
            dockerfile: apps/backend/Dockerfile
            target: runner
            build_args: ""
          - name: dashboard
            dockerfile: apps/dashboard/Dockerfile
            target: runner
            build_args: |
              NEXT_PUBLIC_API_URL=https://api.deqah.net/api/v1
              NEXT_PUBLIC_HCAPTCHA_SITE_KEY=8c765c14-831e-4a76-a1c0-0e3eac06c7f6
          - name: admin
            dockerfile: apps/admin/Dockerfile
            target: runner
            build_args: |
              NEXT_PUBLIC_API_URL=https://api.deqah.net/api/v1
              NEXT_PUBLIC_HCAPTCHA_SITE_KEY=8c765c14-831e-4a76-a1c0-0e3eac06c7f6
          - name: website
            dockerfile: apps/website/Dockerfile
            target: runner
            build_args: |
              NEXT_PUBLIC_API_URL=https://api.deqah.net
              NEXT_PUBLIC_DEFAULT_ORG_ID=00000000-0000-0000-0000-000000000001
              NEXT_PUBLIC_HCAPTCHA_SITE_KEY=8c765c14-831e-4a76-a1c0-0e3eac06c7f6
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Path-based filter: skip building this app if no relevant files changed.
      # Triggers a build when:
      #   - apps/<this-app>/** changed
      #   - packages/** changed (shared code can affect any app)
      #   - root config changed (lockfile, workspace, ci, dockerfile defaults)
      #   - manual workflow_dispatch (always builds — author override)
      #   - tag push (always builds — explicit release)
      - name: Decide if this app needs to build
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          # Always build on workflow_dispatch or tag pushes
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "push" -a "${{ github.ref_type }}" = "tag" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Reason: ${{ github.event_name }} (${{ github.ref_type }})"
            exit 0
          fi

          # Determine changed files vs the previous commit
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # First push to branch — build everything
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Reason: first push (no before SHA)"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE" HEAD || echo "")
          echo "Changed files:"
          echo "$CHANGED" | sed 's/^/  /'

          APP="${{ matrix.app.name }}"
          # Match patterns that should trigger this app's build:
          #   - apps/<app>/**
          #   - packages/** (shared deps)
          #   - root config files that affect all builds
          if echo "$CHANGED" | grep -qE "^(apps/${APP}/|packages/|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|package\.json$|\.npmrc$|\.github/workflows/build-images\.yml$)"; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Reason: paths matched for app=$APP"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Reason: no relevant paths changed for app=$APP — skipping"
          fi

      - name: Set up Docker Buildx
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read app version
        if: steps.filter.outputs.should_build == 'true'
        id: app_version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./apps/${{ matrix.app.name }}/package.json').version")
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read version from apps/${{ matrix.app.name }}/package.json"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building ${{ matrix.app.name }} v$VERSION"

      - name: Extract metadata
        if: steps.filter.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/deqah-${{ matrix.app.name }}
          tags: |
            # Primary: per-app semver from package.json (e.g. v2.0.1)
            type=raw,value=v${{ steps.app_version.outputs.version }}
            # Versioned + sha for unambiguous pinning (e.g. v2.0.1-abc1234)
            type=raw,value=v${{ steps.app_version.outputs.version }}-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}
            # latest — only on main branch pushes (not tags)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # short SHA — always (e.g. abc1234)
            type=sha,prefix=,format=short
            # semver tag — when a v* tag is pushed (legacy support for scripts/release.sh)
            type=ref,event=tag
            # date tag — useful for identifying daily deploys
            type=raw,value={{date 'YYYY-MM-DD'}}-{{run_number}},enable={{is_default_branch}}

      # Resolve Moyasar key with a shell fallback (secrets context is not
      # available inside matrix definitions, only inside step inputs/env).
      - name: Resolve build args
        id: build_args
        if: steps.filter.outputs.should_build == 'true'
        shell: bash
        run: |
          MOYASAR_KEY="${{ secrets.MOYASAR_PUBLISHABLE_KEY }}"
          if [ -z "$MOYASAR_KEY" ]; then
            MOYASAR_KEY="pk_test_replace_me"
          fi
          echo "moyasar_key=$MOYASAR_KEY" >> "$GITHUB_OUTPUT"

      - name: Build & push
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.app.dockerfile }}
          target: ${{ matrix.app.target }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ matrix.app.build_args }}
            ${{ matrix.app.name == 'dashboard' && format('NEXT_PUBLIC_MOYASAR_PLATFORM_PUBLISHABLE_KEY={0}', steps.build_args.outputs.moyasar_key) || '' }}
          cache-from: type=gha,scope=${{ matrix.app.name }}
          cache-to: type=gha,scope=${{ matrix.app.name }},mode=max

      - name: Verify version tag was pushed
        if: steps.filter.outputs.should_build == 'true' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/deqah-${{ matrix.app.name }}"
          VERSION="v${{ steps.app_version.outputs.version }}"
          echo "Verifying $IMAGE:$VERSION exists in registry..."
          if ! docker manifest inspect "$IMAGE:$VERSION" >/dev/null 2>&1; then
            echo "::error::Image $IMAGE:$VERSION was not pushed successfully."
            exit 1
          fi
          echo "✅ $IMAGE:$VERSION confirmed in registry."
