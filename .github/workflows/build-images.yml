# Build & Push to GitHub Container Registry (ghcr.io)
#
# Triggers:
#   - push to main (after the sanitizer publishes from develop→main)
#   - push of a semver tag (v*) — triggered by scripts/release.sh
#   - manual workflow_dispatch
#
# Outputs (per app):
#   ghcr.io/tariiq222/deqah-{backend,dashboard,admin,website}:latest
#                                                              :<sha>
#                                                              :v1.2.3   (on tag push)
#                                                              :2026-05-06 (scheduled)
#
# IMPORTANT — Manual step after the FIRST successful run:
# 1. Go to https://github.com/users/tariiq222/packages
# 2. Click each of the 4 packages (deqah-backend, deqah-dashboard, deqah-admin, deqah-website)
# 3. Settings → Change visibility → Public
# This makes Dokploy able to pull without authentication. Only needed once per package.
#
# The sanitizer (scripts/sync-main-branch.sh) keeps ONLY this file from .github/
# when sanitizing develop → main. All other workflows are stripped from main.

name: Build & Push Images to GHCR

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.app.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - { name: backend,   dockerfile: apps/backend/Dockerfile,   target: runner }
          - { name: dashboard, dockerfile: apps/dashboard/Dockerfile, target: runner }
          - { name: admin,     dockerfile: apps/admin/Dockerfile,     target: runner }
          - { name: website,   dockerfile: apps/website/Dockerfile,   target: runner }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/deqah-${{ matrix.app.name }}
          tags: |
            # latest — only on main branch pushes (not tags)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # short SHA — always (e.g. abc1234)
            type=sha,prefix=,format=short
            # semver tag — when a v* tag is pushed (e.g. v1.0.0)
            type=ref,event=tag
            # date tag — useful for identifying daily deploys (includes run number to disambiguate)
            type=raw,value={{date 'YYYY-MM-DD'}}-{{run_number}},enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.app.dockerfile }}
          target: ${{ matrix.app.target }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app.name }}
          cache-to: type=gha,scope=${{ matrix.app.name }},mode=max
