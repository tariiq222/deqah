# Build & Push to GitHub Container Registry (ghcr.io)
#
# Triggers:
#   - push to main (after the sanitizer publishes from develop→main)
#   - push of a semver tag (v*) — triggered by scripts/release.sh
#   - manual workflow_dispatch
#
# Outputs (per app):
#   ghcr.io/tariiq222/deqah-{backend,dashboard,admin,marketing}:v<semver>  ← primary, from package_json_path
#                                                              :v<semver>-<sha>  ← versioned + sha (main only)
#                                                              :latest           ← supplementary (main only)
#                                                              :<sha>            ← supplementary
#                                                              :<date>-<run>     ← supplementary
#
# IMPORTANT — Manual step after the FIRST successful run for a new app:
# 1. Go to https://github.com/users/tariiq222/packages
# 2. Click the new package (e.g. deqah-marketing)
# 3. Settings → Change visibility → Public
# This makes Dokploy able to pull without authentication. Only needed once per package.
#
# The sanitizer (scripts/sync-main-branch.sh) keeps ONLY this file from .github/
# when sanitizing develop → main. All other workflows are stripped from main.

name: Build & Push Images to GHCR

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.app.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: backend
            dockerfile: apps/backend/Dockerfile
            package_json_path: apps/backend/package.json
            target: runner
            build_args: ""
          - name: dashboard
            dockerfile: apps/dashboard/Dockerfile
            package_json_path: apps/dashboard/package.json
            target: runner
            build_args: |
              NEXT_PUBLIC_API_URL=https://api.deqah.net/api/v1
              NEXT_PUBLIC_HCAPTCHA_SITE_KEY=8c765c14-831e-4a76-a1c0-0e3eac06c7f6
          - name: admin
            dockerfile: apps/admin/Dockerfile
            package_json_path: apps/admin/package.json
            target: runner
            build_args: |
              NEXT_PUBLIC_API_URL=https://api.deqah.net/api/v1
              NEXT_PUBLIC_HCAPTCHA_SITE_KEY=8c765c14-831e-4a76-a1c0-0e3eac06c7f6
          - name: marketing
            dockerfile: apps/marketing/Dockerfile
            package_json_path: apps/marketing/package.json
            target: runner
            build_args: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Version-based filter: build only if the version tag for this app does
      # NOT already exist in GHCR. The Changesets pipeline guarantees that any
      # meaningful change bumps the version (or fails the promote gate), so
      # "version exists in registry" == "nothing new to ship for this app."
      #
      # Triggers a build when:
      #   - tag push (always — explicit release)
      #   - the v<semver> tag for this app does NOT yet exist in ghcr.io
      #   - cannot reach GHCR (defensive: build to be safe)
      - name: Decide if this app needs to build
        id: filter
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          APP="${{ matrix.app.name }}"

          # Tag pushes always build (explicit release intent).
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Reason: tag push — always build"
            exit 0
          fi

          # Read version from explicit package_json_path (supports non-standard dirs like bespoke).
          VERSION=$(node -p "require('./${{ matrix.app.package_json_path }}').version" 2>/dev/null || echo "")
          if [ -z "$VERSION" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Reason: could not read version for ${APP} — building defensively"
            exit 0
          fi
          echo "Resolved ${APP} target version: v${VERSION}"

          # Login to GHCR for the manifest check.
          echo "${GH_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin >/dev/null 2>&1 || true

          IMAGE="ghcr.io/${{ github.repository_owner }}/deqah-${APP}"
          if docker manifest inspect "${IMAGE}:v${VERSION}" >/dev/null 2>&1; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Reason: ${IMAGE}:v${VERSION} already exists in GHCR — skipping"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Reason: ${IMAGE}:v${VERSION} not in GHCR — building"
          fi

      - name: Set up Docker Buildx
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read app version
        if: steps.filter.outputs.should_build == 'true'
        id: app_version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./${{ matrix.app.package_json_path }}').version")
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read version from ${{ matrix.app.package_json_path }}"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building ${{ matrix.app.name }} v$VERSION"

      - name: Extract metadata
        if: steps.filter.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/deqah-${{ matrix.app.name }}
          tags: |
            # Primary: per-app semver from package.json (e.g. v2.0.1)
            type=raw,value=v${{ steps.app_version.outputs.version }}
            # Versioned + sha for unambiguous pinning (e.g. v2.0.1-abc1234)
            type=raw,value=v${{ steps.app_version.outputs.version }}-{{sha}},enable=${{ github.ref == 'refs/heads/main' }}
            # latest — only on main branch pushes (not tags)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # short SHA — always (e.g. abc1234)
            type=sha,prefix=,format=short
            # semver tag — when a v* tag is pushed (legacy support for scripts/release.sh)
            type=ref,event=tag
            # date tag — useful for identifying daily deploys
            type=raw,value={{date 'YYYY-MM-DD'}}-{{run_number}},enable={{is_default_branch}}

      # Resolve Moyasar key with a shell fallback (secrets context is not
      # available inside matrix definitions, only inside step inputs/env).
      - name: Resolve build args
        id: build_args
        if: steps.filter.outputs.should_build == 'true'
        shell: bash
        run: |
          MOYASAR_KEY="${{ secrets.MOYASAR_PUBLISHABLE_KEY }}"
          if [ -z "$MOYASAR_KEY" ]; then
            MOYASAR_KEY="pk_test_replace_me"
          fi
          echo "moyasar_key=$MOYASAR_KEY" >> "$GITHUB_OUTPUT"

      - name: Build & push
        if: steps.filter.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.app.dockerfile }}
          target: ${{ matrix.app.target }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ matrix.app.build_args }}
            ${{ matrix.app.name == 'dashboard' && format('NEXT_PUBLIC_MOYASAR_PLATFORM_PUBLISHABLE_KEY={0}', steps.build_args.outputs.moyasar_key) || '' }}
          cache-from: type=gha,scope=${{ matrix.app.name }}
          cache-to: type=gha,scope=${{ matrix.app.name }},mode=max

      - name: Verify version tag was pushed
        if: steps.filter.outputs.should_build == 'true' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/deqah-${{ matrix.app.name }}"
          VERSION="v${{ steps.app_version.outputs.version }}"
          echo "Verifying $IMAGE:$VERSION exists in registry..."
          if ! docker manifest inspect "$IMAGE:$VERSION" >/dev/null 2>&1; then
            echo "::error::Image $IMAGE:$VERSION was not pushed successfully."
            exit 1
          fi
          echo "✅ $IMAGE:$VERSION confirmed in registry."

      - name: Trigger Dokploy redeploy
        if: steps.filter.outputs.should_build == 'true' && (github.ref == 'refs/heads/main' || github.ref_type == 'tag')
        shell: bash
        env:
          DOKPLOY_BACKEND_WEBHOOK: ${{ secrets.DOKPLOY_BACKEND_WEBHOOK }}
          DOKPLOY_DASHBOARD_WEBHOOK: ${{ secrets.DOKPLOY_DASHBOARD_WEBHOOK }}
          DOKPLOY_ADMIN_WEBHOOK: ${{ secrets.DOKPLOY_ADMIN_WEBHOOK }}
          DOKPLOY_MARKETING_WEBHOOK: ${{ secrets.DOKPLOY_MARKETING_WEBHOOK }}
        run: |
          set -euo pipefail
          APP="${{ matrix.app.name }}"
          case "$APP" in
            backend)   WEBHOOK="$DOKPLOY_BACKEND_WEBHOOK" ;;
            dashboard) WEBHOOK="$DOKPLOY_DASHBOARD_WEBHOOK" ;;
            admin)     WEBHOOK="$DOKPLOY_ADMIN_WEBHOOK" ;;
            marketing) WEBHOOK="$DOKPLOY_MARKETING_WEBHOOK" ;;
            *)         echo "::error::unknown app $APP"; exit 1 ;;
          esac
          if [ -z "${WEBHOOK:-}" ]; then
            echo "No DOKPLOY webhook configured for $APP — skipping"
            exit 0
          fi
          echo "Triggering Dokploy redeploy for $APP..."
          set +e
          HTTP_CODE=$(curl -sS -o /tmp/dokploy.body -w "%{http_code}" \
            -X POST --max-time 30 --retry 2 --retry-delay 5 "$WEBHOOK")
          CURL_EXIT=$?
          set -e
          echo "Dokploy responded $HTTP_CODE for $APP"
          if [ $CURL_EXIT -ne 0 ] || [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Dokploy webhook for $APP failed with HTTP $HTTP_CODE"
            echo "Response body:"
            cat /tmp/dokploy.body || true
            exit 1
          fi
          echo "✅ Dokploy redeploy triggered for $APP"
