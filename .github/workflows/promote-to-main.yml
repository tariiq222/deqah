# Promote staging → main (MANUAL GATE)
#
# This is the only path from staging to production. It must be invoked
# explicitly by an authorized operator (currently @tariiq222).
#
# Trigger:
#   gh workflow run promote-to-main.yml -f confirm=promote
#
# What it does:
#   1. Validates `confirm == "promote"`
#   2. Checks that staging is at or ahead of main
#   3. Fast-forwards main to staging
#   4. Triggers build-images.yml on main → builds :latest tags
#   5. Dokploy auto-deploys production env from new :latest images
#
# Safeguards:
#   - Never force-pushes
#   - Refuses if staging behind main (would be a regression)
#   - Refuses if confirm != "promote"

name: Promote staging → main (manual)

# DISABLED 2026-05-13 — pipeline switched to direct develop → main.
# To re-enable, restore the original `on:` block below from git history.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'DISABLED — pipeline now goes develop → main directly. See auto-promote.yml.'
        required: true
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: promote-to-main
  cancel-in-progress: false

jobs:
  promote:
    name: Fast-forward main from staging
    runs-on: ubuntu-latest
    if: github.actor == 'tariiq222'

    steps:
      - name: Workflow disabled
        run: |
          echo "::error::This workflow is disabled. Pipeline now goes develop → main directly via auto-promote.yml."
          exit 1

      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "promote" ]; then
            echo "::error::Confirmation must be exactly 'promote'. Got: '${{ inputs.confirm }}'"
            exit 1
          fi

      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify staging exists and is ahead of main
        run: |
          set -euo pipefail
          git fetch origin staging main
          STAGING_SHA=$(git rev-parse origin/staging)
          MAIN_SHA=$(git rev-parse origin/main 2>/dev/null || echo "")

          if [ -z "$MAIN_SHA" ]; then
            echo "ℹ️  main does not exist yet — first promotion"
            exit 0
          fi

          # main must be ancestor of staging (no divergence, no main ahead)
          if ! git merge-base --is-ancestor "$MAIN_SHA" "$STAGING_SHA"; then
            echo "::error::main has diverged from staging — manual reconciliation needed"
            echo "main:    $MAIN_SHA"
            echo "staging: $STAGING_SHA"
            exit 1
          fi

          if [ "$MAIN_SHA" = "$STAGING_SHA" ]; then
            echo "::warning::main is already at staging — nothing to promote"
            exit 0
          fi

          AHEAD=$(git rev-list --count "$MAIN_SHA..$STAGING_SHA")
          echo "✅ staging is $AHEAD commit(s) ahead of main"

      - name: Fast-forward main to staging
        run: |
          set -euo pipefail
          git checkout -B main origin/main 2>/dev/null || git checkout -b main
          if ! git merge --ff-only origin/staging; then
            echo "::error::fast-forward main → staging failed"
            exit 1
          fi
          git push origin main
          echo "✅ main is now at $(git rev-parse --short HEAD)"

      - name: Trigger build-images on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run build-images.yml --ref main --repo "${{ github.repository }}"
          echo "✅ build-images.yml dispatched on main"

      - name: Summary
        run: |
          {
            echo "### 🚀 Promoted staging → main"
            echo ""
            echo "main is now at: \`$(git rev-parse --short HEAD)\`"
            echo ""
            echo "**Next:** \`build-images.yml\` will build \`:latest\` tags."
            echo "Dokploy will then auto-deploy the production environment."
            echo ""
            echo "Watch:"
            echo "- [Build progress](https://github.com/${{ github.repository }}/actions/workflows/build-images.yml)"
            echo "- [Dokploy](https://dokploy.webvue.pro)"
          } >> "$GITHUB_STEP_SUMMARY"
