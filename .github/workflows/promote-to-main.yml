name: Promote develop → main (manual)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "promote" to confirm pushing develop to main'
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  sync-staging:
    name: Build clean main branch from develop
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "promote" ]; then
            echo "❌ Confirmation must be exactly 'promote'. Got: '${{ inputs.confirm }}'"
            exit 1
          fi
          echo "✅ Confirmation accepted"

      - name: Checkout develop (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify changesets
        run: node scripts/verify-changesets.mjs

      - name: Consume pending changesets (version bump + CHANGELOG)
        id: consume
        env:
          # @changesets/changelog-github calls the GitHub API to resolve commit
          # SHAs → author handles + clickable PR links in CHANGELOG entries.
          # Requires a token with read:user + repo:status; GITHUB_TOKEN has both
          # at job-level by default but must be explicitly forwarded into the step env.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CHANGESET_COUNT=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l | tr -d ' ')
          if [ "$CHANGESET_COUNT" -gt 0 ]; then
            echo "Found $CHANGESET_COUNT pending changeset(s) — running version..."
            pnpm changeset version
            echo "consumed=true" >> $GITHUB_OUTPUT
          else
            echo "No pending changesets — proceeding with current versions."
            echo "consumed=false" >> $GITHUB_OUTPUT
          fi

      - name: Capture per-app versions
        id: versions
        run: |
          set -euo pipefail
          BACKEND_V=$(node -p "require('./apps/backend/package.json').version")
          DASHBOARD_V=$(node -p "require('./apps/dashboard/package.json').version")
          ADMIN_V=$(node -p "require('./apps/admin/package.json').version")
          MARKETING_V=$(node -p "require('./apps/marketing/package.json').version")
          echo "backend=$BACKEND_V" >> $GITHUB_OUTPUT
          echo "dashboard=$DASHBOARD_V" >> $GITHUB_OUTPUT
          echo "admin=$ADMIN_V" >> $GITHUB_OUTPUT
          echo "marketing=$MARKETING_V" >> $GITHUB_OUTPUT
          echo "Captured versions: backend=$BACKEND_V, dashboard=$DASHBOARD_V, admin=$ADMIN_V, marketing=$MARKETING_V"

      - name: Append version-history.md row
        # version-history.md is pre-seeded with the 6-column header on develop
        # (see commit that introduced Changesets). This step appends ONLY a row.
        run: |
          set -euo pipefail
          HISTORY="docs/operations/version-history.md"
          PROMOTED_AT=$(date -u +"%Y-%m-%d %H:%M UTC")
          SOURCE_SHORT=$(git rev-parse --short HEAD)
          printf "| %s | v%s | v%s | v%s | v%s | %s |\n" \
            "$PROMOTED_AT" \
            "${{ steps.versions.outputs.backend }}" \
            "${{ steps.versions.outputs.dashboard }}" \
            "${{ steps.versions.outputs.admin }}" \
            "${{ steps.versions.outputs.marketing }}" \
            "$SOURCE_SHORT" >> "$HISTORY"

      - name: Commit version bump + history row, push to develop
        # Single rebase + commit + push window. Combines what used to be two
        # separate pushes into one to shrink the race against concurrent
        # commits to develop. [skip ci] is harmless today (no workflow triggers
        # on develop pushes) but kept defensively.
        run: |
          set -euo pipefail
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit — no version bump and no history change."
            exit 0
          fi
          git commit -m "chore(release): version packages + record promote [skip ci]"
          # Rebase against latest develop in case a human pushed during the run.
          # Conflict here = manual recovery; bail loudly rather than corrupt state.
          if ! git pull --rebase origin develop; then
            echo "::error::rebase against origin/develop failed — manual fix required"
            exit 1
          fi
          git push origin develop

      - name: Compute deploy manifest from changesets
        # This step runs BEFORE the sanitizer strips .changeset/.
        # It writes .deploy-manifest.json so build-images.yml can read which
        # apps to build. The manifest survives sanitization because
        # sync-main-branch.sh copies it into the main tree.
        #
        # Logic:
        #   1. Parse .changeset/*.md frontmatter for bumped package names.
        #   2. Map workspace names → app names: backend→backend, dashboard→dashboard,
        #      admin→admin, marketing→marketing.
        #   3. If any shared package (@deqah/shared, @deqah/api-client, @deqah/ui)
        #      is bumped, include ALL apps that depend on it
        #      (dashboard + admin + marketing consume @deqah/* per package.json).
        #   4. If no changesets, default to all apps (conservative fallback).
        run: |
          set -euo pipefail

          MANIFEST_FILE=".deploy-manifest.json"
          SHA=$(git rev-parse --short HEAD)

          # Collect changeset files (exclude README.md)
          CHANGESET_FILES=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' 2>/dev/null || true)

          if [[ -z "$CHANGESET_FILES" ]]; then
            echo "No changesets found — deploying all apps."
            node -e "
              const manifest = { apps: ['backend','dashboard','admin','marketing'], sha: '${SHA}', reason: 'no-changesets-fallback' };
              require('fs').writeFileSync('${MANIFEST_FILE}', JSON.stringify(manifest, null, 2));
            "
            exit 0
          fi

          node -e "
            const fs = require('fs');
            const path = require('path');

            // Packages that, when bumped, trigger ALL consumers
            const sharedPkgs = new Set(['@deqah/shared', '@deqah/api-client', '@deqah/ui']);

            // Which apps consume shared packages (from their package.json deps)
            const sharedConsumers = ['dashboard', 'admin', 'marketing'];

            // Workspace name → app name mapping
            const pkgToApp = {
              'backend': 'backend',
              'dashboard': 'dashboard',
              'admin': 'admin',
              'marketing': 'marketing',
            };

            const affectedApps = new Set();
            let sharedBumped = false;

            const files = \`${CHANGESET_FILES}\`.trim().split('\n').filter(Boolean);
            for (const f of files) {
              const content = fs.readFileSync(f, 'utf8');
              // Parse YAML frontmatter between --- delimiters
              const match = content.match(/^---\n([\s\S]*?)\n---/);
              if (!match) continue;
              const frontmatter = match[1];
              for (const line of frontmatter.split('\n')) {
                const m = line.match(/^[\"']?([^\"':]+)[\"']?\s*:\s*/);
                if (!m) continue;
                const pkg = m[1].trim();
                if (sharedPkgs.has(pkg)) {
                  sharedBumped = true;
                } else if (pkgToApp[pkg]) {
                  affectedApps.add(pkgToApp[pkg]);
                }
              }
            }

            if (sharedBumped) {
              for (const app of sharedConsumers) affectedApps.add(app);
            }

            const apps = affectedApps.size > 0
              ? [...affectedApps].sort()
              : ['backend','dashboard','admin','marketing'];

            const manifest = { apps, sha: '${SHA}', reason: affectedApps.size > 0 ? 'changeset-analysis' : 'empty-changeset-fallback' };
            fs.writeFileSync('${MANIFEST_FILE}', JSON.stringify(manifest, null, 2));
            console.log('Deploy manifest:', JSON.stringify(manifest));
          "

          echo "Manifest written to ${MANIFEST_FILE}"
          cat "${MANIFEST_FILE}"

      - name: Build clean main branch
        env:
          CI: "true"
        run: |
          set -euo pipefail
          SOURCE_SHA=$(git rev-parse HEAD)
          SOURCE_SHORT=$(git rev-parse --short HEAD)

          # Run sanitizer — produces ./main-tree/
          bash scripts/sync-main-branch.sh

          # Create orphan branch with the cleaned tree
          cd main-tree
          git init -b main
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add -A
          git commit \
            -m "Production promote from develop @ ${SOURCE_SHORT}" \
            -m "Source: ${SOURCE_SHA}" \
            -m "Versions: backend=v${{ steps.versions.outputs.backend }}, dashboard=v${{ steps.versions.outputs.dashboard }}, admin=v${{ steps.versions.outputs.admin }}, marketing=v${{ steps.versions.outputs.marketing }}"
          git push --force origin main

      - name: Trigger build-images workflow on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh workflow run build-images.yml --ref main --repo ${{ github.repository }}
          echo "✅ build-images workflow dispatched on main"
          echo "Watch: https://github.com/${{ github.repository }}/actions/workflows/build-images.yml"
