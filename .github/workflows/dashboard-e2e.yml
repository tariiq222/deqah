name: Dashboard E2E (Playwright)

on:
  pull_request:
    paths:
      - 'apps/dashboard/**'
      - 'apps/backend/**'
  schedule:
    # Nightly at 02:00 UTC — runs full flows suite
    - cron: '0 2 * * *'

jobs:
  smoke:
    name: Smoke Suite (PR gate)
    runs-on: ubuntu-latest
    # Only run the smoke suite on PRs; nightly runs the flows job below.
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: deqah_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend prisma:generate

      - name: Build backend
        run: pnpm --filter backend build

      - name: Run database migrations
        run: pnpm --filter backend prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/deqah_test?schema=public

      - name: Seed database
        run: pnpm --filter backend seed
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/deqah_test?schema=public
          SUPER_ADMIN_EMAIL: admin@example.com
          SUPER_ADMIN_PASSWORD: Admin@1234

      - name: Start backend
        run: |
          pnpm --filter backend start &
          echo $! > /tmp/backend.pid
          # Wait up to 60 s for health endpoint
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5100/api/health > /dev/null 2>&1; then
              echo "Backend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start within 60s"
          kill $(cat /tmp/backend.pid) 2>/dev/null || true
          exit 1
        env:
          # --- CI env — safe test-only values. For secrets, add to repo Settings → Secrets:
          # RESEND_API_KEY (optional — emails silently skipped if unset in test)
          # MOYASAR_PLATFORM_SECRET_KEY (optional — use sk_test_* for billing tests)
          # FCM_PROJECT_ID, FCM_CLIENT_EMAIL, FCM_PRIVATE_KEY (optional — push notifications)
          # OPENAI_API_KEY, OPENROUTER_API_KEY (optional — AI features)
          NODE_ENV: test
          PORT: '5100'
          DATABASE_URL: postgresql://test:test@localhost:5432/deqah_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          JWT_ACCESS_SECRET: ci-access-secret-at-least-16-chars
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-16-chars
          JWT_OTP_SECRET: ci-otp-secret-at-least-16-chars
          JWT_CLIENT_ACCESS_SECRET: ci-client-access-secret-16-chars
          TENANT_ENFORCEMENT: strict
          DEFAULT_ORGANIZATION_ID: 00000000-0000-0000-0000-000000000001
          SMS_PROVIDER_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          ZOOM_PROVIDER_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          MOYASAR_TENANT_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          PLATFORM_DEFAULT_PLAN_SLUG: BASIC
          SUPER_ADMIN_EMAIL: admin@example.com
          SUPER_ADMIN_PASSWORD: Admin@1234
          ADMIN_HOSTS: localhost:5100
          THROTTLER_DISABLED: 'true'
          BILLING_CRON_ENABLED: 'false'
          ZATCA_ENABLED: 'false'
          MINIO_ENDPOINT: localhost
          MINIO_PORT: '9000'
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: deqah-v2
          MINIO_USE_SSL: 'false'
          MINIO_INVOICE_BUCKET: deqah-invoices
          DASHBOARD_PUBLIC_URL: http://localhost:5103

      - name: Install Playwright browsers
        working-directory: apps/dashboard
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite
        working-directory: apps/dashboard
        run: npm run e2e:smoke
        env:
          CI: true
          NEXT_PUBLIC_HCAPTCHA_SITE_KEY: ''
          PW_DASHBOARD_URL: http://localhost:5103
          NEXT_PUBLIC_API_URL: http://localhost:5100/api

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: apps/dashboard/playwright-report/
          retention-days: 7

  flows:
    name: Flows Suite (nightly)
    runs-on: ubuntu-latest
    # Only run the full flows suite on the nightly schedule.
    if: github.event_name == 'schedule'

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: deqah_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
