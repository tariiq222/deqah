          MOYASAR_TENANT_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          PLATFORM_DEFAULT_PLAN_SLUG: BASIC
