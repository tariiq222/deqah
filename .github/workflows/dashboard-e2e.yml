      - name: Build backend
        run: pnpm --filter backend build

      - name: Run database migrations
        run: pnpm --filter backend prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/deqah_test?schema=public

      - name: Seed database
        run: pnpm --filter backend seed
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/deqah_test?schema=public
          SUPER_ADMIN_EMAIL: admin@example.com
          SUPER_ADMIN_PASSWORD: Admin@1234

      - name: Start backend
        run: |
