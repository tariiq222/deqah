# Auto-promote develop → main
#
# Triggered on every push to develop. After CI passes, fast-forwards
# the main branch to develop. build-images.yml then takes over and
# deploys production.
#
# Pipeline:
#   develop ──[this]──▶ main ──[build-images:latest tag]──▶ Dokploy production
#
# NOTE: staging branch exists in the repo but is paused from automation
# (2026-05-13). To re-enable a staged pipeline, restore the previous
# version of this file and promote-to-main.yml from git history.
#
# Escape hatches:
#   [skip auto-promote]  in commit message — skip
#   [skip ci]            in commit message — skip

name: Auto-promote develop → main

on:
  push:
    branches: [develop]

permissions:
  contents: write
  actions: write

concurrency:
  group: auto-promote-main
  cancel-in-progress: false

jobs:
  promote:
    name: Fast-forward main from develop
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip auto-promote]') &&
      !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for CI to succeed on this SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          echo "Waiting for CI on $SHA..."
          for i in $(seq 1 30); do
            STATUS=$(gh run list --workflow=ci.yml --branch=develop --commit="$SHA" --limit=1 --json status,conclusion --jq '.[0] // {}')
            STATE=$(echo "$STATUS" | jq -r '.status // ""')
            CONCL=$(echo "$STATUS" | jq -r '.conclusion // ""')
            echo "[$i/30] CI status=$STATE conclusion=$CONCL"
            if [ "$STATE" = "completed" ]; then
              if [ "$CONCL" = "success" ]; then
                echo "✅ CI passed"
                exit 0
              else
                echo "❌ CI failed (conclusion=$CONCL) — skipping promotion"
                exit 1
              fi
            fi
            sleep 20
          done
          echo "::error::CI did not complete within 10 minutes"
          exit 1

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward main to develop
        run: |
          set -euo pipefail
          git fetch origin main:main 2>/dev/null || git checkout -b main
          git checkout main
          if ! git merge --ff-only origin/develop; then
            echo "::error::main has diverged from develop — manual fix required"
            exit 1
          fi
          git push origin main
          echo "✅ main is now at $(git rev-parse --short HEAD)"

      - name: Trigger build-images workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Triggering build-images.yml for main..."
          gh workflow run build-images.yml \
            --repo ${{ github.repository }} \
            --ref main \
            -f apps=all
          echo "✅ build-images.yml triggered"

      - name: Summary
        run: |
          {
            echo "### ✅ Auto-promote develop → main"
            echo ""
            echo "main is now at: \`$(git rev-parse --short HEAD)\`"
            echo ""
            echo "**Next:** \`build-images.yml\` was triggered to build \`:latest\` tags and Dokploy will deploy to production."
          } >> "$GITHUB_STEP_SUMMARY"
